<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Відкриття сайту</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f0f2f5; text-align: center; }
        .card { padding: 30px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 300px; position: relative; z-index: 1; }
        .btn { display: inline-block; padding: 15px 25px; background: #0088cc; color: white !important; text-decoration: none; border-radius: 12px; font-weight: bold; margin-top: 20px; cursor: pointer; border: none; font-size: 16px; }
        .hint { font-size: 0.9em; color: #666; margin-top: 20px; line-height: 1.5; }
        
        /* Стилі стрілочки для iPhone */
        #ios-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); color: white; z-index: 100; }
        .arrow { position: absolute; top: 10px; right: 15px; font-size: 60px; animation: bounce 1s infinite; }
        .instruction { position: absolute; top: 80px; right: 20px; left: 20px; font-size: 1.2em; text-align: right; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

<div class="card">
    <h3>Майже готово!</h3>
    <p>Для стабільної роботи відкрийте сайт у повному браузері</p>
    
    <a href="#" id="open-link" class="btn">ВІДКРИТИ САЙТ</a>

    <div class="hint">
        Якщо сайт не відкрився:<br>
        Натисніть <b>⋮ або ⋯</b><br>
        та оберіть <b>"Відкрити у браузері"</b>
    </div>
</div>

<div id="ios-overlay" onclick="this.style.display='none'">
    <div class="arrow">↗</div>
    <div class="instruction">
        Натисніть сюди <b>(⋯)</b><br>
        та оберіть<br>
        <b>«Відкрити у браузері»</b>
    </div>
</div>

<script>
    // ПОВНЕ ПОСИЛАННЯ (заміни тільки частину ПІСЛЯ https://)
    const rawUrl = "cloud.uislab.com/ords/f?p=2900:LOGIN_DESKTOP::::::";

    function tryRedirect() {
        const isAndroid = /Android/i.test(navigator.userAgent);
        const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
        const btn = document.getElementById('open-link');
        const overlay = document.getElementById('ios-overlay');

        if (isAndroid) {
            // Використовуємо ту саму схему, яка у тебе працювала
            const intentUrl = `intent://${rawUrl}#Intent;scheme=https;package=com.android.chrome;end`;
            
            btn.href = intentUrl;
            window.location.href = intentUrl;
        } else if (isIOS) {
            // Для iOS кнопка показує стрілочку
            btn.onclick = function(e) {
                e.preventDefault();
                overlay.style.display = 'block';
            };
        } else {
            // Для всіх інших - просто посилання
            btn.href = "https://" + rawUrl;
        }
    }

    window.onload = tryRedirect;
</script>

</body>
</html>
