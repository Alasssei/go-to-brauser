<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перехід до браузера</title>
    <style>
        /* ПОВЕРТАЄМО Твій улюблений стиль №1 */
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f4f4f9; text-align: center; }
        .card { padding: 20px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 300px; position: relative; z-index: 1; }
        .btn { display: inline-block; padding: 12px 24px; background: #0088cc; color: white !important; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 20px; cursor: pointer; border: none; font-size: 16px; width: 80%; }
        .hint { font-size: 0.9em; color: #666; margin-top: 15px; }

        /* Стилі для оверлею зі стрілкою (iOS) */
        #ios-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); color: white; z-index: 100; }
        .arrow { position: absolute; top: 10px; right: 15px; font-size: 60px; line-height: 1; animation: bounce 1s infinite; }
        .instruction { position: absolute; top: 80px; right: 20px; left: 20px; font-size: 1.2em; line-height: 1.5; text-align: right; font-weight: 500; }
        .instruction b { color: #55ceff; }
        @keyframes bounce { 0%, 100% { transform: translateY(0) translateX(0); } 50% { transform: translateY(-10px) translateX(5px); } }
    </style>
</head>
<body>

<div class="card">
    <h3>Майже готово!</h3>
    <p id="status-text">Для стабільної роботи відкрийте сайт у повному браузері</p>
    
    <button id="open-link" class="btn">ВІДКРИТИ САЙТ</button>

    <div class="hint">
        Якщо сайт не відкрився:<br>
        <b>Натисніть ⋮ або ⋯</b><br>
        і оберіть <b>"Відкрити у браузері"</b>
    </div>
</div>

<div id="ios-overlay" onclick="this.style.display='none'">
    <div class="arrow">↗</div>
    <div class="instruction">
        Натисніть сюди <b>(⋯)</b><br>
        та оберіть<br>
        <b>«Відкрити у браузері»</b>
    </div>
</div>

<script>
    // === КОНФІГУРАЦІЯ ===
    const fullTargetUrl = "https://cloud.uislab.com/ords/f?p=2900:LOGIN_DESKTOP::::::"; 
    const cleanUrl = "cloud.uislab.com/ords/f?p=2900:LOGIN_DESKTOP::::::";
    // ===================

    const isAndroid = /Android/i.test(navigator.userAgent);
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    
    const openBtn = document.getElementById('open-link');
    const statusText = document.getElementById('status-text');
    const iosOverlay = document.getElementById('ios-overlay');

    window.onload = function() {
        if (isAndroid) {
            // ЛОГІКА ДЛЯ ANDROID (Intent через Chrome)
            const intentUrl = `intent://${cleanUrl}#Intent;scheme=https;action=android.intent.action.VIEW;package=com.android.chrome;end`;
            const fallbackIntent = `intent://${cleanUrl}#Intent;scheme=https;action=android.intent.action.VIEW;end`;

            const tryOpen = () => {
                window.location.href = intentUrl;
                setTimeout(() => { window.location.href = fallbackIntent; }, 2000);
            };

            openBtn.onclick = tryOpen;
            setTimeout(tryOpen, 500);

        } else if (isIOS) {
            // ЛОГІКА ДЛЯ iOS (Стрілочка)
            openBtn.innerText = "ЯК ВІДКРИТИ";
            openBtn.onclick = function(e) {
                e.preventDefault();
                iosOverlay.style.display = 'block';
            };
        } else {
            // ДЛЯ ПК
            openBtn.onclick = function() {
                window.location.href = fullTargetUrl;
            };
        }
    };
</script>

</body>
</html>
